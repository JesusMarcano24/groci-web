<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>groci — Listas de compras del hogar</title>
  <meta name="description" content="Listas, recetas y presupuesto del hogar en una sola app." />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a; color: #fff;
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .card { max-width: 360px; }
    h1 { font-size: 32px; margin: 0 0 8px; color: #22c55e; }
    p  { font-size: 16px; line-height: 1.55; color: #a1a1aa; margin: 0 0 28px; }
    .btn {
      display: inline-block; background: #22c55e; color: #fff;
      text-decoration: none; padding: 14px 28px; border-radius: 12px;
      font-weight: 700; font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>groci</h1>
    <p>Listas de compras del hogar.<br>Recetas, presupuesto e historial en un solo lugar.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=app.groci">
      Descargar en Google Play
    </a>
  </div>
</body>
</html>
